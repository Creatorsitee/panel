@import "tailwindcss";

@theme inline {
  /* Primary brand color - Cyan/Teal for tech-forward look */
  --color-primary-50: oklch(97% 0.02 200);
  --color-primary-100: oklch(94% 0.04 200);
  --color-primary-200: oklch(88% 0.08 200);
  --color-primary-300: oklch(78% 0.12 200);
  --color-primary-400: oklch(68% 0.16 195);
  --color-primary-500: oklch(60% 0.18 195);
  --color-primary-600: oklch(52% 0.16 195);
  --color-primary-700: oklch(44% 0.14 195);
  --color-primary-800: oklch(36% 0.12 195);
  --color-primary-900: oklch(28% 0.1 195);

  /* Surface colors - refined dark theme */
  --color-surface-50: oklch(98% 0 0);
  --color-surface-100: oklch(96% 0 0);
  --color-surface-200: oklch(92% 0 0);
  --color-surface-800: oklch(18% 0.005 260);
  --color-surface-900: oklch(14% 0.005 260);
  --color-surface-950: oklch(10% 0.005 260);
}

/* Custom utility classes for the new theme */
@layer utilities {
  .bg-panel {
    background-color: oklch(10% 0.005 260);
  }
  
  .bg-panel-secondary {
    background-color: oklch(14% 0.005 260);
  }
  
  .bg-panel-elevated {
    background-color: oklch(18% 0.005 260);
  }
  
  .border-panel {
    border-color: oklch(25% 0.01 260 / 0.5);
  }
  
  .text-panel-primary {
    color: oklch(98% 0 0);
  }
  
  .text-panel-secondary {
    color: oklch(65% 0 0);
  }
  
  .text-panel-muted {
    color: oklch(50% 0 0);
  }
  
  .accent-primary {
    color: oklch(68% 0.16 195);
  }
  
  .bg-accent-primary {
    background-color: oklch(68% 0.16 195);
  }
  
  .border-accent {
    border-color: oklch(68% 0.16 195 / 0.3);
  }
  
  .glow-accent {
    box-shadow: 0 0 20px oklch(68% 0.16 195 / 0.15);
  }
  
  .card-hover {
    transition: all 0.2s ease;
  }
  
  .card-hover:hover {
    background-color: oklch(20% 0.005 260);
    border-color: oklch(30% 0.01 260 / 0.6);
  }
}
